name: CI/CD Pipeline for Portfolio

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. TESTING STAGE
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18, 20]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: |
          npm init -y
          npm install --save-dev htmlhint stylelint eslint
      
      - name: Lint HTML
        run: npx htmlhint index.html || true
      
      - name: Lint CSS (embedded in HTML)
        run: |
          # Extract CSS from HTML and check
          grep -oP '(?<=<style>).*?(?=</style>)' index.html | \
          npx stylelint --stdin || true
      
      - name: Check for broken links
        run: |
          npm install --save-dev broken-link-checker-local
          npx blcl http://localhost:3000 || true
      
      - name: Validate HTML structure
        run: |
          npm install --save-dev html-validator
          npx html-validator --file=index.html || true

  # 2. LINTING & CODE QUALITY
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check file size
        run: |
          echo "Checking file sizes..."
          find . -type f -name "*.html" -exec du -h {} \;
      
      - name: Check for security headers
        run: |
          echo "Checking security best practices..."
          if grep -q "meta.*viewport" index.html; then
            echo "✅ Viewport meta tag found"
          else
            echo "⚠️  Missing viewport meta tag"
          fi

  # 3. BUILD & DEPLOY
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Optimize assets
        run: |
          echo "Optimizing HTML..."
          # Minify HTML (optional)
          # npm install -g html-minifier
          # html-minifier --collapse-whitespace --remove-comments index.html -o index.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Notify deployment
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"